<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mege — Status dos Alunos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div style="max-width:1140px; margin:0 auto;">

  <div class="page-header">
    <div class="page-title">Status dos Alunos Mege</div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" placeholder="Buscar por nome, CPF ou e-mail…" oninput="applyFilters()">
      </div>
      <div class="filter-group">
        <button class="filter-pill active" onclick="setFilter('all',this)">Todos</button>
        <button class="filter-pill" onclick="setFilter('active',this)">Ativos</button>
        <button class="filter-pill" onclick="setFilter('inactive',this)">Inativos</button>
        <button class="filter-pill" onclick="setFilter('locked',this)">Trancados</button>
        <button class="filter-pill" onclick="setFilter('cancelled',this)">Cancelados</button>
      </div>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>CPF</th>
          <th>Email</th>
          <th class="hide-md">Telefone</th>
          <th class="hide-md">Aniversário</th>
          <th>Status</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="table-footer">
      <span id="countLabel">—</span>
      <span>Mege Admin</span>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-name" id="mName">—</div>
        <div class="modal-meta" id="mMeta">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="section-label">Novo status</div>
      <div class="status-grid">
        <button class="status-opt so-active"    data-v="active"    onclick="pickStatus('active')">
          <div class="so-dot"></div>
          <div><div class="so-txt" style="color:#2d7a46">Ativo</div><div class="so-sub">Acesso Completo</div></div>
        </button>
        <button class="status-opt so-inactive"  data-v="inactive"  onclick="pickStatus('inactive')">
          <div class="so-dot"></div>
          <div><div class="so-txt" style="color:#777">Inativo</div><div class="so-sub">Acesso Inativo</div></div>
        </button>
        <button class="status-opt so-locked"    data-v="locked"    onclick="pickStatus('locked')">
          <div class="so-dot"></div>
          <div><div class="so-txt" style="color:#a07020">Trancado</div><div class="so-sub">Acesso Pausado / Pendente</div></div>
        </button>
        <button class="status-opt so-cancelled" data-v="cancelled" onclick="pickStatus('cancelled')">
          <div class="so-dot"></div>
          <div><div class="so-txt" style="color:#c03030">Cancelado</div><div class="so-sub">Encerramento do acesso do aluno</div></div>
        </button>
      </div>

      <div id="accessBox" class="access-box" style="display:none">
        <div class="section-label" style="margin-bottom:8px">Permissões</div>
        <div id="accessRows"></div>
      </div>

      <label class="form-label">Motivo</label>
      <select class="form-select" id="reasonSel">
        <option value="">Selecione o motivo…</option>
      </select>

      <label class="form-label">Informações adicionais</label>
      <textarea class="form-textarea" id="reasonNote" placeholder="Descreva o motivo da alteração de status do aluno"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-save"  onclick="saveModal()">Salvar alterações</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot" id="tDot"></div>
  <span id="tMsg"></span>
</div>

<script src="script.js"></script>
</body>
</html>
