<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mege - Mural de Recados</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ofertas-mege.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <a href="index.html">
      <img src="logo.jpg" alt="Logo Mege" style="width:150px;">
    </a>
  </div>
   <nav id="nav"></nav>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-badge">
      <div class="dot"></div>
      Clube da Magistratura 2026.1 (...)
      <span style="font-size:10px; color:#aaa;">▼</span>
    </div>

    <div class="topbar-right">

      <!-- Bell / Notificações -->
      <div class="notif-wrapper">
        <button id="btn-notif" class="btn-notif" title="Notificações">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
        <span id="notif-badge" class="notif-badge" style="display:none;">0</span>

        <div id="notif-panel" class="notif-panel">
          <div class="notif-panel-title">Notificações</div>
          <div class="notif-list"></div>
        </div>
      </div>

      <!-- Usuário -->
      <div class="user-info">
        <div class="user-avatar">A</div>
        <span class="user-name">ALFREDO</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

    </div>
  </div><!-- /topbar -->

  <!-- CONTENT -->
  <div class="page-content">

    <div class="page-header">
      <div class="breadcrumb">Mural de Recados</div>
      <h1><i class="fa-solid fa-comments"></i> Mural de Recados</h1>
      <p class="page-subtitle">Turma: Clube da Magistratura 2026.1 (Premium)</p>
    </div>

    <!-- Mural card -->
    <div class="card">
      <div class="card-header">
        <h2>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
          </svg>
          Meus recados
        </h2>
      </div>
      <div id="recados-list"></div>
    </div>

  </div><!-- /page-content -->

</div><!-- /main -->

<!-- TOAST -->
<div id="toast"></div>

<script src="app.js"></script>
<script src="ofertas-mege.js"></script>
</body>
</html>
